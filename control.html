<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Control</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}

button{
font-size:30px;
padding:15px 30px;
margin:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Death Control</h1>

<button onclick="add()">+1</button>
<button onclick="minus()">-1</button>
<button onclick="reset()">Reset</button>

<script>

function get(){
return parseInt(localStorage.getItem("deathcount") || 0);
}

function set(v){
localStorage.setItem("deathcount",v);
}

function add(){
set(get()+1);
}

function minus(){
let v=get();
if(v>0)set(v-1);
}

function reset(){
set(0);
}

</script>

</body>
</html>
