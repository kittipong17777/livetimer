<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Timer</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#timer {
  font-size: 100px;
  font-weight: bold;
  color: white;
  font-family: Arial, sans-serif;
  text-shadow: 0 0 30px rgba(0,0,0,0.9);
}
</style>

</head>
<body>

<div id="timer">00:00:00</div>

<script>
let seconds;

// ถ้ายังไม่มีค่าเก่า → เริ่มที่ 5:40:00
if (localStorage.getItem("savedTime")) {
  seconds = parseInt(localStorage.getItem("savedTime"));
} else {
  seconds = (5 * 3600) + (40 * 60); // 05:40:00
  localStorage.setItem("savedTime", seconds);
}

function updateTimer() {
  seconds++;
  localStorage.setItem("savedTime", seconds);

  let hrs = Math.floor(seconds / 3600);
  let mins = Math.floor((seconds % 3600) / 60);
  let secs = seconds % 60;

  document.getElementById("timer").innerText =
    String(hrs).padStart(2, '0') + ":" +
    String(mins).padStart(2, '0') + ":" +
    String(secs).padStart(2, '0');
}

updateTimer();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
