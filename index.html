<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2 Hour Countdown</title>

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
  }

  .timer {
    font-size: 80px;
    font-weight: bold;
    color: white;
    text-align: center;
    margin-top: 20%;
    text-shadow: 0 0 10px black;
  }
</style>
</head>

<body>

<div class="timer" id="timer">02:00:00</div>

<script>
let totalSeconds = 2 * 60 * 60; // 2 hours

function formatTime(sec) {
  let h = Math.floor(sec / 3600);
  let m = Math.floor((sec % 3600) / 60);
  let s = sec % 60;

  return (
    String(h).padStart(2, '0') + ":" +
    String(m).padStart(2, '0') + ":" +
    String(s).padStart(2, '0')
  );
}

function startCountdown() {
  let current = totalSeconds;

  setInterval(() => {
    document.getElementById("timer").innerText = formatTime(current);

    current--;

    if (current < 0) {
      current = totalSeconds; // รีเซ็ตใหม่เมื่อครบ
    }
  }, 1000);
}

startCountdown();
</script>

</body>
</html>
