<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Counter</title>

<style>
html, body {
margin:0;
padding:0;
background:transparent;
font-family:Arial;
}

#counter{
font-size:120px;
color:red;
font-weight:bold;
text-align:center;
text-shadow:0 0 20px black;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
font-size:20px;
margin:5px;
padding:10px 20px;
}
</style>

</head>

<body>

<div id="counter">0</div>

<div id="controls">
<button onclick="add()">+1</button>
<button onclick="minus()">-1</button>
<button onclick="reset()">Reset</button>
</div>

<script>

let deaths = 0;

function update(){
document.getElementById("counter").innerText = deaths;
}

function add(){
deaths++;
update();
}

function minus(){
if(deaths>0) deaths--;
update();
}

function reset(){
deaths = 0;
update();
}

document.addEventListener("keydown",function(e){
if(e.key.toLowerCase()=="l"){
add();
}
});

</script>

</body>
</html>
