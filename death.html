<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Counter</title>

<style>
html,body{
margin:0;
padding:0;
background:transparent;
overflow:hidden;
font-family:Arial, sans-serif;
text-align:center;
}

#title{
font-size:60px;
color:white;
text-shadow:0 0 10px black;
}

#counter{
font-size:150px;
color:red;
font-weight:bold;
text-shadow:0 0 30px black;
}
</style>
</head>

<body>

<div id="title">DEAD</div>
<div id="counter">0</div>

<script>

function update(){
let value = localStorage.getItem("deathcount") || 0;
document.getElementById("counter").innerText = value;
}

setInterval(update,200);

</script>

</body>
</html>
